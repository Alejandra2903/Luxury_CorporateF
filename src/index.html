<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Luxury - Smart Corporate Resource &amp; Financial Optimizer</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // Aplica el tema antes del primer paint para evitar flash de
    // tema incorrecto (FOUC). Debe ejecutarse sincrónicamente, antes
    // de que Angular bootstrapee — por eso vive aquí y no en un
    // servicio Angular, que solo correría después del primer render.
    (function () {
      try {
        var guardado = localStorage.getItem('luxury_theme');
        var tema = guardado === 'dark' || guardado === 'light'
          ? guardado
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', tema);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
