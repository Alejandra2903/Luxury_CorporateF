<div class="app-stage">
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand__mark">L</span>
        <strong>Luxury</strong>
      </div>

      <div class="topbar__actions">
        <button type="button" class="theme-toggle" (click)="alternarTema()" [attr.aria-label]="'Cambiar a tema ' + (tema() === 'dark' ? 'claro' : 'oscuro')">
          <span aria-hidden="true">{{ tema() === 'dark' ? '☀️' : '🌙' }}</span>
        </button>
        <div class="user-chip">
          <span>ADMIN</span>
          <strong>{{ usuario()?.nombreCompleto }}</strong>
        </div>
        <button type="button" class="text-button" (click)="cerrarSesion()">Salir</button>
      </div>
    </header>

    <div class="workspace" [class.workspace--sidebar-expanded]="sidebarExpandido()">
      <aside class="sidebar" [class.sidebar--expanded]="sidebarExpandido()">
        <app-navigation
          [expanded]="sidebarExpandido()"
          (menuItemClick)="onMenuItemClick()"
        />
      </aside>

      <main class="content">
        <router-outlet />
      </main>
    </div>
  </div>
</div>
