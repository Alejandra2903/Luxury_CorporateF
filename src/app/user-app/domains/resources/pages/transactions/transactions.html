<section class="transactions-page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Transacciones</p>
      <h1>Transacciones de consumo</h1>
    </div>
  </header>

  @if (cargando()) {
    <div class="state">Cargando transacciones...</div>
  } @else {
    @if (mensaje()) {
      <div class="message">{{ mensaje() }}</div>
    }

    @if (puedeRegistrar()) {
      <form class="entry-form" [formGroup]="registroForm" (ngSubmit)="registrarConsumo()">
        <header>
          <span>Nuevo registro</span>
          <strong>Consumo operativo</strong>
        </header>

        <label>
          <span>Sede</span>
          <select formControlName="sedeId">
            @for (sede of sedes(); track sede.id) {
              <option [ngValue]="sede.id">{{ sede.nombre }}</option>
            }
          </select>
        </label>

        <label>
          <span>Recurso</span>
          <select formControlName="tipoRecursoId">
            @for (tipo of tipos(); track tipo.id) {
              <option [ngValue]="tipo.id">{{ tipo.nombre }}</option>
            }
          </select>
        </label>

        <label>
          <span>Periodo</span>
          <input
            type="month"
            [min]="periodoMinimoInput"
            [max]="periodoMaximoInput"
            formControlName="periodo"
          />
          @if (registroForm.controls.periodo.touched && registroForm.controls.periodo.hasError('required')) {
            <small class="field-error">Este campo es obligatorio</small>
          }
          @if (registroForm.controls.periodo.touched && registroForm.controls.periodo.hasError('min')) {
            <small class="field-error">La fecha mínima es enero 2020</small>
          }
          @if (registroForm.controls.periodo.touched && registroForm.controls.periodo.hasError('max')) {
            <small class="field-error">No se permiten fechas futuras</small>
          }
        </label>

        <label>
          <span>Cantidad</span>
          <input type="number" min="1" max="999999" step="1" formControlName="cantidad" />
          @if (registroForm.controls.cantidad.touched && registroForm.controls.cantidad.dirty && registroForm.controls.cantidad.hasError('required')) {
            <small class="field-error">Este campo es obligatorio</small>
          }
          @if (registroForm.controls.cantidad.touched && registroForm.controls.cantidad.dirty && registroForm.controls.cantidad.hasError('pattern')) {
            <small class="field-error">La cantidad debe ser un número entero</small>
          }
          @if (registroForm.controls.cantidad.touched && registroForm.controls.cantidad.dirty && registroForm.controls.cantidad.hasError('min')) {
            <small class="field-error">La cantidad mínima es 1</small>
          }
          @if (registroForm.controls.cantidad.touched && registroForm.controls.cantidad.dirty && registroForm.controls.cantidad.hasError('max')) {
            <small class="field-error">La cantidad máxima es 999,999</small>
          }
        </label>

        <label>
          <span>Costo</span>
          <input type="number" min="0.01" max="9999999.99" step="0.01" formControlName="costo" />
          @if (registroForm.controls.costo.touched && registroForm.controls.costo.dirty && registroForm.controls.costo.hasError('required')) {
            <small class="field-error">Este campo es obligatorio</small>
          }
          @if (registroForm.controls.costo.touched && registroForm.controls.costo.dirty && registroForm.controls.costo.hasError('pattern')) {
            <small class="field-error">El costo permite máximo 2 decimales</small>
          }
          @if (registroForm.controls.costo.touched && registroForm.controls.costo.dirty && registroForm.controls.costo.hasError('min')) {
            <small class="field-error">El costo debe ser mayor a 0</small>
          }
          @if (registroForm.controls.costo.touched && registroForm.controls.costo.dirty && registroForm.controls.costo.hasError('max')) {
            <small class="field-error">El costo máximo es 9,999,999.99</small>
          }
        </label>

        <label class="entry-form__wide">
          <span>Observacion</span>
          <input type="text" formControlName="observacion" placeholder="Opcional" />
        </label>

        <button type="submit" [disabled]="guardando() || registroForm.invalid">
          {{ guardando() ? 'Registrando...' : 'Registrar consumo' }}
        </button>
      </form>
    }

    <form class="filters" [formGroup]="filtros">
      <label>
        <span>Sede</span>
        <select formControlName="sedeId">
          <option [ngValue]="0">Todas las sedes</option>
          @for (sede of sedes(); track sede.id) {
            <option [ngValue]="sede.id">{{ sede.nombre }}</option>
          }
        </select>
      </label>

      <label>
        <span>Recurso</span>
        <select formControlName="tipoRecursoId">
          <option [ngValue]="0">Todos los recursos</option>
          @for (tipo of tipos(); track tipo.id) {
            <option [ngValue]="tipo.id">{{ tipo.nombre }}</option>
          }
        </select>
      </label>

      <label>
        <span>Periodo</span>
        <input type="month" formControlName="periodo" />
      </label>
    </form>

    <div class="stat-grid">
      <app-resource-stat-card label="Registros" [value]="consumosFiltrados().length.toString()" detail="Segun filtros" />
      <app-resource-stat-card label="Costo filtrado" [value]="formatearMonto(totalCosto())" detail="Moneda PEN" />
      <app-resource-stat-card
        label="Observados"
        [value]="observados().toString()"
        detail="Pendientes de revision"
        [tone]="observados() > 0 ? 'warning' : 'neutral'"
      />
    </div>

    <app-consumption-table [consumos]="consumosFiltrados()" />
  }
</section>
